# 1C KB — nginx reverse proxy (TLS termination)
# Замените kb.example.com и пути к сертификатам.

upstream kb_web {
    server 127.0.0.1:5050;
    keepalive 8;
}

server {
    listen 80;
    server_name kb.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kb.example.com;

    # certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/kb.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kb.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 512m;

    location / {
        proxy_pass http://kb_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-KB-API-Token $http_x_kb_api_token;

        # SSE: /api/jobs/<id>/stream
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
